name: Build and deploy Node.js app to Azure Web App - mycapeplanner-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: server

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_97347FBD48464AB198F613B236B5A8E1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3DF813707C284D5DA7553E1EB87F94EE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E0DA47D8EBBA4D278C32F305702CF113 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: mycapeplanner-api
          slot-name: Production
          package: .
